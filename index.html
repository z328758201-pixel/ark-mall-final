<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ARK Mall</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:20px;text-align:center}
.header h1{font-size:28px;margin-bottom:4px}
.header p{opacity:.85;font-size:14px}
.price-bar{background:#fff;padding:12px 16px;display:flex;justify-content:center;gap:24px;flex-wrap:wrap;border-bottom:1px solid #eee;position:sticky;top:0;z-index:100}
.price-item{font-size:13px;color:#555}
.price-item span{font-weight:700;color:#111}
.price-item i{margin-right:4px}
.container{max-width:1200px;margin:0 auto;padding:16px}
.section-title{font-size:20px;font-weight:700;margin:20px 0 12px;padding-left:12px;border-left:4px solid #667eea}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:transform .2s}
.card:hover{transform:translateY(-3px)}
.card img{width:100%;height:200px;object-fit:cover}
.card-body{padding:14px}
.card-body h3{font-size:16px;margin-bottom:6px}
.card-body .desc{font-size:13px;color:#888;margin-bottom:8px}
.card-body .merchant{font-size:12px;color:#667eea;margin-bottom:8px}
.prices{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.prices .tag{background:#f0f2f5;padding:3px 8px;border-radius:6px;font-size:12px}
.prices .tag.usd{color:#059669;font-weight:700}
.btn{display:inline-block;padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:14px;text-decoration:none;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-outline{background:transparent;border:1.5px solid #667eea;color:#667eea}
.btn-sm{padding:5px 12px;font-size:12px}
/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{margin-bottom:16px}
.modal .close{float:right;font-size:24px;cursor:pointer;color:#999}
.modal .field{margin-bottom:12px}
.modal .field label{display:block;font-size:13px;color:#666;margin-bottom:4px}
.modal .field input,.modal .field textarea,.modal .field select{width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px}
.modal .field textarea{resize:vertical;min-height:60px}
.merchant-info{background:#f8f9fa;border-radius:8px;padding:12px;margin-top:10px;font-size:12px}
.merchant-info h4{margin-bottom:6px;color:#667eea}
.merchant-info .addr{word-break:break-all;font-family:monospace;color:#555}
.qr-img{max-width:150px;margin-top:8px;border-radius:8px}
/* Cart */
.cart-float{position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 12px rgba(102,126,234,.5);cursor:pointer;z-index:90}
.cart-float .badge{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:11px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;z-index:999;display:none}
.toast.show{display:block;animation:fadeInOut 2s}
@keyframes fadeInOut{0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0}}
/* Merchant Registration */
.reg-section{background:#fff;border-radius:12px;padding:20px;margin:20px 0;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.reg-section h3{margin-bottom:12px}
</style>
</head>
<body>
<div class="header">
  <h1><i class="fas fa-store"></i> ARK Mall</h1>
  <p>加密貨幣電商平台</p>
</div>
<div class="price-bar" id="priceBar">
  <div class="price-item"><i class="fas fa-coins" style="color:#f0b90b"></i>BNB: <span id="pBnb">...</span></div>
  <div class="price-item"><i class="fas fa-dragon" style="color:#667eea"></i>ARK: <span id="pArk">...</span></div>
  <div class="price-item"><i class="fas fa-dollar-sign" style="color:#059669"></i>USD/CNY: <span id="pCny">...</span></div>
</div>
<div class="container">
  <div class="section-title">商品</div>
  <div class="grid" id="productsGrid"></div>

  <div class="reg-section">
    <h3><i class="fas fa-store-alt"></i> 商家入駐</h3>
    <p style="font-size:13px;color:#888;margin-bottom:12px">填寫以下信息申請成為商家</p>
    <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:end">
      <div class="field" style="flex:1;min-width:150px"><label>商家名稱</label><input id="regName" placeholder="店名"></div>
      <div class="field" style="flex:1;min-width:150px"><label>TP 錢包地址</label><input id="regAddr" placeholder="0x..."></div>
      <div class="field" style="flex:1;min-width:150px"><label>簡介</label><input id="regDesc" placeholder="經營類目"></div>
    </div>
    <div style="margin-top:10px">
      <label style="font-size:13px;color:#666">收款二維碼（圖片）</label>
      <input type="file" id="regQrFile" accept="image/*" style="margin-top:4px">
    </div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="registerMerchant()">提交入駐</button>
  </div>
</div>

<!-- Product Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <span class="close" onclick="closeModal('detailModal')">&times;</span>
    <h2 id="dName"></h2>
    <img id="dImg" style="width:100%;border-radius:8px;margin-bottom:12px">
    <p id="dDesc" style="color:#666;margin-bottom:12px"></p>
    <div class="prices" id="dPrices"></div>
    <div class="merchant-info" id="dMerchant"></div>
    <div style="margin-top:16px;display:flex;gap:10px;align-items:center">
      <label style="font-size:14px">數量:</label>
      <input type="number" id="dQty" value="1" min="1" style="width:60px;padding:6px;border:1.5px solid #ddd;border-radius:6px;text-align:center">
      <button class="btn btn-primary" onclick="buyNow()">立即購買</button>
      <button class="btn btn-outline" onclick="addToCart()">加入購物車</button>
    </div>
  </div>
</div>

<!-- Cart Modal -->
<div class="modal-overlay" id="cartModal">
  <div class="modal">
    <span class="close" onclick="closeModal('cartModal')">&times;</span>
    <h2><i class="fas fa-shopping-cart"></i> 購物車</h2>
    <div id="cartList"></div>
    <div style="margin-top:16px;text-align:right">
      <strong>合計: $<span id="cartTotal">0</span></strong>
      <button class="btn btn-primary" style="margin-left:10px" onclick="checkout()">結算</button>
    </div>
  </div>
</div>

<div class="cart-float" onclick="openCart()">
  <i class="fas fa-shopping-cart"></i>
  <div class="badge" id="cartBadge" style="display:none">0</div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = 'https://5569aacd.strike-agent.com/api';
let products = [], merchants = [], prices = { bnb: 580, ark: 7.80, usdCny: 6.80 };
let cart = JSON.parse(localStorage.getItem('ark_cart') || '[]');
let currentProduct = null;

// ============ Price Format ============
function fmt(usd) {
  const cny = usd * prices.usdCny;
  const bnb = prices.bnb > 0 ? usd / prices.bnb : 0;
  const ark = prices.ark > 0 ? usd / prices.ark : 0;
  return '$' + usd.toFixed(2) + ' / ¥' + cny.toFixed(2) + ' / ' + bnb.toFixed(4) + ' BNB / ' + ark.toFixed(2) + ' ARK';
}

// ============ Toast ============
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 2000);
}

// ============ Load Data ============
async function loadPrices() {
  try {
    const r = await fetch(API + '/prices');
    const d = await r.json();
    if (d.bnb) prices.bnb = d.bnb;
    if (d.ark) prices.ark = d.ark;
    if (d.usdCny) prices.usdCny = d.usdCny;
  } catch(e) {}
  document.getElementById('pBnb').textContent = '$' + prices.bnb.toFixed(2);
  document.getElementById('pArk').textContent = '$' + prices.ark.toFixed(2);
  document.getElementById('pCny').textContent = prices.usdCny.toFixed(2);
}

async function loadProducts() {
  try {
    const r = await fetch(API + '/products');
    products = await r.json();
    renderProducts();
  } catch(e) { console.error(e); }
}

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = products.map(p => `
    <div class="card" onclick="showDetail(${p.id})">
      <img src="${p.image_url || 'https://picsum.photos/400/300'}" alt="${p.name}">
      <div class="card-body">
        <h3>${p.name}</h3>
        <div class="desc">${p.description}</div>
        <div class="merchant"><i class="fas fa-store"></i> ${p.merchant_name}</div>
        <div class="prices"><span class="tag usd">${fmt(p.price)}</span></div>
        <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();showDetail(${p.id})">查看詳情</button>
      </div>
    </div>
  `).join('');
}

function showDetail(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  currentProduct = p;
  document.getElementById('dName').textContent = p.name;
  document.getElementById('dImg').src = p.image_url || '';
  document.getElementById('dDesc').textContent = p.description;
  document.getElementById('dPrices').innerHTML = '<span class="tag usd" style="font-size:15px">' + fmt(p.price) + '</span>';

  let merchantHtml = '<h4><i class="fas fa-store"></i> ' + (p.merchant_name || '未知商家') + '</h4>';
  merchantHtml += '<div class="addr">' + (p.merchant_tp_address || '未提供') + '</div>';
  if (p.merchant_qrcode) merchantHtml += '<img class="qr-img" src="' + p.merchant_qrcode + '">';
  document.getElementById('dMerchant').innerHTML = merchantHtml;

  document.getElementById('detailModal').classList.add('active');
}

// ============ Cart ============
function addToCart() {
  if (!currentProduct) return;
  const qty = parseInt(document.getElementById('dQty').value) || 1;
  const existing = cart.find(c => c.id === currentProduct.id);
  if (existing) existing.qty += qty;
  else cart.push({ id: currentProduct.id, name: currentProduct.name, price: currentProduct.price, qty });
  localStorage.setItem('ark_cart', JSON.stringify(cart));
  updateBadge();
  toast('已加入購物車');
  closeModal('detailModal');
}

function buyNow() {
  addToCart();
  openCart();
}

function openCart() {
  renderCart();
  document.getElementById('cartModal').classList.add('active');
}

function renderCart() {
  const list = document.getElementById('cartList');
  if (!cart.length) { list.innerHTML = '<p style="text-align:center;color:#999;padding:20px">購物車空空如也</p>'; document.getElementById('cartTotal').textContent = '0'; return; }
  let total = 0;
  list.innerHTML = cart.map((c, i) => {
    const sub = c.price * c.qty;
    total += sub;
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #eee">' +
      '<div><strong>' + c.name + '</strong><br><span style="font-size:13px;color:#888">$' + c.price.toFixed(2) + ' × ' + c.qty + '</span></div>' +
      '<div style="display:flex;align-items:center;gap:8px"><span>$' + sub.toFixed(2) + '</span><button class="btn btn-outline btn-sm" onclick="removeCart(' + i + ')">刪除</button></div></div>';
  }).join('');
  document.getElementById('cartTotal').textContent = total.toFixed(2);
}

function removeCart(i) { cart.splice(i, 1); localStorage.setItem('ark_cart', JSON.stringify(cart)); renderCart(); updateBadge(); }

function updateBadge() {
  const b = document.getElementById('cartBadge');
  const n = cart.reduce((s, c) => s + c.qty, 0);
  b.textContent = n;
  b.style.display = n > 0 ? 'flex' : 'none';
}

async function checkout() {
  if (!cart.length) return toast('購物車空');
  for (const c of cart) {
    await fetch(API + '/orders', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ product_id: c.id, quantity: c.qty, buyer_address: 'wallet_user' }) });
  }
  cart = [];
  localStorage.removeItem('ark_cart');
  updateBadge();
  renderCart();
  toast('訂單已提交！');
}

// ============ Merchant Registration ============
async function registerMerchant() {
  const name = document.getElementById('regName').value.trim();
  const addr = document.getElementById('regAddr').value.trim();
  const desc = document.getElementById('regDesc').value.trim();
  const file = document.getElementById('regQrFile').files[0];

  if (!name || !addr) return toast('請填寫商家名稱和 TP 地址');

  let qrcode_url = '';
  if (file) {
    const fd = new FormData();
    fd.append('file', file);
    try {
      const ur = await fetch(API + '/upload', { method: 'POST', body: fd });
      const ud = await ur.json();
      if (ud.url) qrcode_url = window.location.origin + ud.url;
    } catch(e) {}
  }

  try {
    const r = await fetch(API + '/merchants', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, description: desc, tp_address: addr, qrcode_url }) });
    const d = await r.json();
    if (d.id) {
      toast('入駐申請已提交！審核通過後自動上架');
      document.getElementById('regName').value = '';
      document.getElementById('regAddr').value = '';
      document.getElementById('regDesc').value = '';
      document.getElementById('regQrFile').value = '';
    } else {
      toast('提交失敗：' + (d.error || ''));
    }
  } catch(e) { toast('網絡錯誤'); }
}

// ============ Modal ============
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('active'); });
});

// ============ Init ============
(async function() {
  await loadPrices();
  await loadProducts();
  updateBadge();
})();
</script>
</body>
</html>
