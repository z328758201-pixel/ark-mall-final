<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ARK Mall - 管理後台</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:linear-gradient(180deg,#667eea,#764ba2);color:#fff;padding:20px 0;flex-shrink:0}
.sidebar .logo{text-align:center;padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,.2)}
.sidebar .logo h2{font-size:18px}
.sidebar .logo small{opacity:.7}
.sidebar-menu{list-style:none;padding:12px 0}
.sidebar-menu li a{display:block;padding:12px 24px;color:rgba(255,255,255,.8);text-decoration:none;font-size:14px;transition:all .2s}
.sidebar-menu li a:hover,.sidebar-menu li a.active{background:rgba(255,255,255,.15);color:#fff}
.sidebar-menu li a i{width:20px;margin-right:8px;text-align:center}
.main{flex:1;padding:20px;overflow-y:auto}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.topbar h1{font-size:22px}
.topbar .wallet{background:#fff;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1.5px solid #667eea}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:20px}
.card-stat{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-stat h3{font-size:13px;color:#888;margin-bottom:8px}
.card-stat .num{font-size:28px;font-weight:700;color:#667eea}
.panel{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px;display:none}
.panel.active{display:block}
.panel h2{font-size:18px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #eee}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #f0f0f0;font-size:13px}
th{background:#f8f9fa;font-weight:600;color:#555}
.badge{padding:3px 10px;border-radius:10px;font-size:12px;font-weight:600}
.badge-green{background:#d1fae5;color:#065f46}
.badge-yellow{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;margin:2px}
.btn-green{background:#10b981;color:#fff}
.btn-red{background:#ef4444;color:#fff}
.btn-gray{background:#9ca3af;color:#fff}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="logo"><h2>ARK Mall</h2><small>管理後台</small></div>
    <ul class="sidebar-menu">
      <li><a href="#" class="active" onclick="showPanel('dashboard',this)"><i class="fas fa-chart-pie"></i>控制面板</a></li>
      <li><a href="#" onclick="showPanel('merchants',this)"><i class="fas fa-store"></i>商家審核</a></li>
      <li><a href="#" onclick="showPanel('products',this)"><i class="fas fa-box"></i>商品管理</a></li>
      <li><a href="#" onclick="showPanel('orders',this)"><i class="fas fa-receipt"></i>訂單管理</a></li>
      <li><a href="/"><i class="fas fa-arrow-left"></i>返回商城</a></li>
    </ul>
  </div>
  <div class="main">
    <div class="topbar">
      <h1 id="pageTitle">控制面板</h1>
      <div class="wallet" id="walletBtn" onclick="connectWallet()"><i class="fas fa-wallet"></i> 連接錢包</div>
    </div>
    <div class="cards">
      <div class="card-stat"><h3>商家總數</h3><div class="num" id="statMerchants">0</div></div>
      <div class="card-stat"><h3>待審核</h3><div class="num" id="statPending" style="color:#f59e0b">0</div></div>
      <div class="card-stat"><h3>商品數量</h3><div class="num" id="statProducts">0</div></div>
      <div class="card-stat"><h3>訂單總數</h3><div class="num" id="statOrders">0</div></div>
    </div>

    <div class="panel active" id="dashboardPanel"><h2>歡迎使用管理後台</h2><p style="color:#888">點擊左側菜單管理商家、商品和訂單。</p></div>

    <div class="panel" id="merchantsPanel">
      <h2>商家審核</h2>
      <table><thead><tr><th>ID</th><th>名稱</th><th>TP 地址</th><th>二維碼</th><th>狀態</th><th>操作</th></tr></thead>
      <tbody id="merchantsTbody"></tbody></table>
    </div>

    <div class="panel" id="productsPanel">
      <h2>商品管理</h2>
      <table><thead><tr><th>ID</th><th>名稱</th><th>價格(USD)</th><th>庫存</th><th>商家</th><th>狀態</th></tr></thead>
      <tbody id="productsTbody"></tbody></table>
    </div>

    <div class="panel" id="ordersPanel">
      <h2>訂單管理</h2>
      <table><thead><tr><th>訂單號</th><th>商品</th><th>金額(USD)</th><th>買家</th><th>狀態</th><th>時間</th></tr></thead>
      <tbody id="ordersTbody"></tbody></table>
    </div>
  </div>
</div>

<script>
const API = window.location.origin + '/api';
let currentAccount = null;

async function api(endpoint, method, data) {
  const opts = { method: method || 'GET', headers: { 'Content-Type': 'application/json' } };
  if (data) opts.body = JSON.stringify(data);
  const r = await fetch(API + endpoint, opts);
  return r.json();
}

async function connectWallet() {
  if (typeof window.ethereum === 'undefined') return alert('請安裝 MetaMask！');
  try {
    await window.ethereum.request({ method: 'eth_requestAccounts' });
    const provider = new ethers.BrowserProvider(window.ethereum);
    const signer = await provider.getSigner();
    currentAccount = await signer.getAddress();
    document.getElementById('walletBtn').innerHTML = '<i class="fas fa-wallet"></i> ' + currentAccount.slice(0, 6) + '...' + currentAccount.slice(-4);
    loadAll();
  } catch(e) { console.error(e); }
}

function showPanel(name, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(name + 'Panel').classList.add('active');
  document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
  if (el) el.classList.add('active');
  const titles = { dashboard: '控制面板', merchants: '商家審核', products: '商品管理', orders: '訂單管理' };
  document.getElementById('pageTitle').textContent = titles[name] || name;
}

async function loadAll() {
  // Merchants
  const allMerchants = await api('/merchants');
  const pendingMerchants = await api('/merchants/pending');
  const merged = [...pendingMerchants, ...allMerchants.filter(m => m.status !== 'pending')];
  document.getElementById('statMerchants').textContent = allMerchants.length;
  document.getElementById('statPending').textContent = pendingMerchants.length;

  document.getElementById('merchantsTbody').innerHTML = merged.map(m => {
    const sc = m.status === 'approved' ? 'badge-green' : (m.status === 'pending' ? 'badge-yellow' : 'badge-red');
    const st = m.status === 'approved' ? '已通過' : (m.status === 'pending' ? '待審核' : '已拒絕');
    const acts = m.status === 'pending' ?
      '<button class="btn btn-green" onclick="approveM(' + m.id + ')">通過</button>' : '';
    return '<tr><td>' + m.id + '</td><td>' + m.name + '</td><td style="font-family:monospace;font-size:11px">' + (m.tp_address || '').slice(0, 12) + '...</td>' +
      '<td>' + (m.qrcode_url ? '<img src="' + m.qrcode_url + '" style="width:40px;height:40px;object-fit:cover;border-radius:4px">' : '—') + '</td>' +
      '<td><span class="badge ' + sc + '">' + st + '</span></td><td>' + acts + '</td></tr>';
  }).join('');

  // Products
  const prods = await api('/products');
  document.getElementById('statProducts').textContent = prods.length;
  document.getElementById('productsTbody').innerHTML = prods.map(p =>
    '<tr><td>' + p.id + '</td><td>' + p.name + '</td><td>$' + p.price.toFixed(2) + '</td><td>' + p.stock + '</td><td>' + (p.merchant_name || '') + '</td><td><span class="badge badge-green">上架中</span></td></tr>'
  ).join('');

  // Orders
  const ords = await api('/orders');
  document.getElementById('statOrders').textContent = ords.length;
  document.getElementById('ordersTbody').innerHTML = ords.map(o => {
    const sm = { pending: '待支付', paid: '已支付', shipped: '已發貨', completed: '已完成' };
    return '<tr><td style="font-size:11px">' + o.order_no + '</td><td>' + (o.product_name || o.product_id) + '</td><td>$' + (o.total_price || 0).toFixed(2) + '</td>' +
      '<td style="font-size:11px">' + (o.buyer_address || '').slice(0, 10) + '...</td><td><span class="badge badge-yellow">' + (sm[o.status] || o.status) + '</span></td><td>' + new Date(o.created_at).toLocaleString('zh-CN') + '</td></tr>';
  }).join('');
}

async function approveM(id) {
  const r = await api('/merchants/' + id + '/approve', 'PUT');
  if (r.id) { alert('已通過！'); loadAll(); } else alert('操作失敗');
}

// Auto load (without wallet for read-only)
window.addEventListener('load', () => { loadAll(); });
</script>
<script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js"></script>
</body>
</html>
