<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ARK Mall - 商家後台</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:linear-gradient(180deg,#059669,#10b981);color:#fff;padding:20px 0;flex-shrink:0}
.sidebar .logo{text-align:center;padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,.2)}
.sidebar .logo h2{font-size:18px}
.sidebar .logo small{opacity:.7}
.sidebar-menu{list-style:none;padding:12px 0}
.sidebar-menu li a{display:block;padding:12px 24px;color:rgba(255,255,255,.8);text-decoration:none;font-size:14px;transition:all .2s}
.sidebar-menu li a:hover,.sidebar-menu li a.active{background:rgba(255,255,255,.15);color:#fff}
.sidebar-menu li a i{width:20px;margin-right:8px;text-align:center}
.main{flex:1;padding:20px;overflow-y:auto}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.topbar h1{font-size:22px}
.topbar .wallet{background:#fff;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1.5px solid #10b981}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:20px}
.card-stat{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-stat h3{font-size:13px;color:#888;margin-bottom:8px}
.card-stat .num{font-size:28px;font-weight:700;color:#10b981}
.panel{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px;display:none}
.panel.active{display:block}
.panel h2{font-size:18px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #eee}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #f0f0f0;font-size:13px}
th{background:#f8f9fa;font-weight:600;color:#555}
.badge{padding:3px 10px;border-radius:10px;font-size:12px;font-weight:600}
.badge-green{background:#d1fae5;color:#065f46}
.badge-yellow{background:#fef3c7;color:#92400e}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;margin:2px}
.btn-green{background:#10b981;color:#fff}
.btn-blue{background:#3b82f6;color:#fff}
.btn-red{background:#ef4444;color:#fff}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;color:#666;margin-bottom:4px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px}
.form-group textarea{resize:vertical;min-height:60px}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;max-width:500px;width:90%}
.modal h3{margin-bottom:16px}
.modal .close{float:right;font-size:24px;cursor:pointer;color:#999}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="logo"><h2>ARK Mall</h2><small>商家後台</small></div>
    <ul class="sidebar-menu">
      <li><a href="#" class="active" onclick="showPanel('dashboard',this)"><i class="fas fa-chart-pie"></i>控制面板</a></li>
      <li><a href="#" onclick="showPanel('products',this)"><i class="fas fa-box"></i>商品管理</a></li>
      <li><a href="#" onclick="showPanel('orders',this)"><i class="fas fa-receipt"></i>訂單管理</a></li>
      <li><a href="#" onclick="showPanel('store',this)"><i class="fas fa-cog"></i>店鋪設置</a></li>
      <li><a href="/"><i class="fas fa-arrow-left"></i>返回商城</a></li>
    </ul>
  </div>
  <div class="main">
    <div class="topbar">
      <h1 id="pageTitle">控制面板</h1>
      <div class="wallet" id="walletBtn" onclick="connectWallet()"><i class="fas fa-wallet"></i> 連接錢包</div>
    </div>
    <div class="cards">
      <div class="card-stat"><h3>我的商品</h3><div class="num" id="statProducts">0</div></div>
      <div class="card-stat"><h3>訂單數量</h3><div class="num" id="statOrders">0</div></div>
      <div class="card-stat"><h3>銷售額(USD)</h3><div class="num" id="statSales">$0</div></div>
    </div>

    <div class="panel active" id="dashboardPanel"><h2>歡迎</h2><p style="color:#888">連接錢包後可管理您的商品和訂單。</p></div>

    <div class="panel" id="productsPanel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="margin:0">我的商品</h2>
        <button class="btn btn-green" onclick="openAddModal()"><i class="fas fa-plus"></i> 添加商品</button>
      </div>
      <table><thead><tr><th>ID</th><th>名稱</th><th>價格(USD)</th><th>庫存</th><th>狀態</th><th>操作</th></tr></thead>
      <tbody id="productsTbody"></tbody></table>
    </div>

    <div class="panel" id="ordersPanel">
      <h2>訂單管理</h2>
      <table><thead><tr><th>訂單號</th><th>商品</th><th>金額</th><th>買家</th><th>狀態</th><th>操作</th></tr></thead>
      <tbody id="ordersTbody"></tbody></table>
    </div>

    <div class="panel" id="storePanel">
      <h2>店鋪設置</h2>
      <div class="form-group"><label>商家名稱</label><input id="storeName"></div>
      <div class="form-group"><label>簡介</label><textarea id="storeDesc"></textarea></div>
      <div class="form-group"><label>TP 錢包收款地址</label><input id="storeAddr" placeholder="0x..."></div>
      <div class="form-group"><label>收款二維碼</label><input type="file" id="storeQr" accept="image/*"></div>
      <button class="btn btn-green" onclick="saveStore()" style="margin-top:8px">保存</button>
    </div>
  </div>
</div>

<!-- Add Product Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <span class="close" onclick="closeAddModal()">&times;</span>
    <h3>添加商品</h3>
    <div class="form-group"><label>商品名稱</label><input id="pName"></div>
    <div class="form-group"><label>描述</label><textarea id="pDesc"></textarea></div>
    <div class="form-group"><label>價格 (USD)</label><input type="number" id="pPrice" step="0.01"></div>
    <div class="form-group"><label>庫存</label><input type="number" id="pStock" value="100"></div>
    <div class="form-group"><label>分類</label><select id="pCat"><option>周邊</option><option>書籍</option><option>配件</option><option>數位</option></select></div>
    <div class="form-group"><label>圖片 URL</label><input id="pImg" placeholder="https://..."></div>
    <button class="btn btn-green" onclick="submitProduct()" style="margin-top:8px">提交</button>
  </div>
</div>

<script>
const API = window.location.origin + '/api';
let currentAccount = null, currentMerchant = null;
let myProducts = [], myOrders = [];

async function api(ep, method, data) {
  const opts = { method: method || 'GET', headers: { 'Content-Type': 'application/json' } };
  if (data) opts.body = JSON.stringify(data);
  return (await fetch(API + ep, opts)).json();
}

async function connectWallet() {
  if (typeof window.ethereum === 'undefined') return alert('請安裝 MetaMask！');
  try {
    await window.ethereum.request({ method: 'eth_requestAccounts' });
    const provider = new ethers.BrowserProvider(window.ethereum);
    const signer = await provider.getSigner();
    currentAccount = await signer.getAddress();
    document.getElementById('walletBtn').innerHTML = '<i class="fas fa-wallet"></i> ' + currentAccount.slice(0, 6) + '...' + currentAccount.slice(-4);
    await loadMerchantData();
  } catch(e) { console.error(e); }
}

async function loadMerchantData() {
  const all = await api('/merchants');
  currentMerchant = all.find(m => m.tp_address && m.tp_address.toLowerCase() === currentAccount.toLowerCase());
  if (!currentMerchant) {
    alert('您的錢包未註冊為商家，請先在商城入駐！');
    return;
  }
  document.getElementById('storeName').value = currentMerchant.name || '';
  document.getElementById('storeDesc').value = currentMerchant.description || '';
  document.getElementById('storeAddr').value = currentMerchant.tp_address || '';

  const prods = await api('/products');
  myProducts = prods.filter(p => p.merchant_id === currentMerchant.id);
  document.getElementById('statProducts').textContent = myProducts.length;
  renderMyProducts();

  const ords = await api('/orders');
  myOrders = ords.filter(o => o.merchant_id === currentMerchant.id);
  document.getElementById('statOrders').textContent = myOrders.length;
  const sales = myOrders.filter(o => o.status !== 'cancelled').reduce((s, o) => s + (o.total_price || 0), 0);
  document.getElementById('statSales').textContent = '$' + sales.toFixed(2);
  renderMyOrders();
}

function renderMyProducts() {
  document.getElementById('productsTbody').innerHTML = myProducts.map(p =>
    '<tr><td>' + p.id + '</td><td>' + p.name + '</td><td>$' + p.price.toFixed(2) + '</td><td>' + p.stock + '</td><td><span class="badge badge-green">上架中</span></td><td><button class="btn btn-red" onclick="delist(' + p.id + ')">下架</button></td></tr>'
  ).join('') || '<tr><td colspan="6" style="text-align:center;color:#999">暫無商品</td></tr>';
}

function renderMyOrders() {
  document.getElementById('ordersTbody').innerHTML = myOrders.map(o => {
    const sm = { pending: '待支付', paid: '已支付', shipped: '已發貨', completed: '已完成' };
    const acts = o.status === 'paid' ? '<button class="btn btn-blue" onclick="ship(' + o.id + ')">發貨</button>' : '';
    return '<tr><td style="font-size:11px">' + o.order_no + '</td><td>' + (o.product_name || '') + '</td><td>$' + (o.total_price || 0).toFixed(2) + '</td>' +
      '<td style="font-size:11px">' + (o.buyer_address || '').slice(0, 10) + '...</td><td><span class="badge badge-yellow">' + (sm[o.status] || o.status) + '</span></td><td>' + acts + '</td></tr>';
  }).join('') || '<tr><td colspan="6" style="text-align:center;color:#999">暫無訂單</td></tr>';
}

function openAddModal() { document.getElementById('addModal').classList.add('active'); }
function closeAddModal() { document.getElementById('addModal').classList.remove('active'); }

async function submitProduct() {
  if (!currentMerchant) return alert('請先連接錢包');
  const r = await api('/products', 'POST', {
    merchant_id: currentMerchant.id,
    name: document.getElementById('pName').value,
    description: document.getElementById('pDesc').value,
    price: parseFloat(document.getElementById('pPrice').value),
    stock: parseInt(document.getElementById('pStock').value),
    category: document.getElementById('pCat').value,
    image_url: document.getElementById('pImg').value
  });
  if (r.id) { alert('添加成功！'); closeAddModal(); loadMerchantData(); }
  else alert('失敗：' + (r.error || ''));
}

async function delist(id) {
  if (!confirm('確定下架？')) return;
  const r = await api('/products/' + id, 'PUT', { status: 'inactive', stock: 0 });
  if (r.id) { alert('已下架'); loadMerchantData(); }
}

async function ship(id) {
  const r = await api('/orders/' + id, 'PUT', { status: 'shipped' });
  if (r.id) { alert('已發貨'); loadMerchantData(); }
}

async function saveStore() {
  if (!currentMerchant) return alert('請先連接錢包');
  let qrcode_url = currentMerchant.qrcode_url || '';
  const file = document.getElementById('storeQr').files[0];
  if (file) {
    const fd = new FormData();
    fd.append('file', file);
    const ur = await fetch(API + '/upload', { method: 'POST', body: fd });
    const ud = await ur.json();
    if (ud.url) qrcode_url = window.location.origin + ud.url;
  }
  const r = await api('/merchants/' + currentMerchant.id, 'PUT', {
    name: document.getElementById('storeName').value,
    description: document.getElementById('storeDesc').value,
    tp_address: document.getElementById('storeAddr').value,
    qrcode_url
  });
  if (r.id) alert('店鋪信息已保存！');
}

function showPanel(name, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(name + 'Panel').classList.add('active');
  document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('pageTitle').textContent = { dashboard: '控制面板', products: '商品管理', orders: '訂單管理', store: '店鋪設置' }[name] || name;
}
</script>
<script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js"></script>
</body>
</html>
